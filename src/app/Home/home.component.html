<div class="main">

  <header class="topbar">
    <div class="title">BookBuddy</div>

    <div class="user-container">
      <div class="user" (click)="toggleDropdown()">
        {{ userName }} <img src="/icons/user.png" class="user-icon" alt="">
      </div>
      <div class="dropdown" *ngIf="showDropdown">
        <div class="dropdown-item" routerLink="/profile">
          <img src="/icons/user.png" alt=""> Profile
        </div>
        <div class="dropdown-item" (click)="logout()">
          <img src="/icons/logout.png" alt=""> Logout
        </div>
      </div>
    </div>
  </header>
  <div class="container">

    <aside class="sidebar">

      <ul class="menu">
        <li class="active" routerLink="/home">
          <img src="/icons/home.png" alt="">Home
        </li>
        <li routerLink="/notification">
          <img src="/icons/notification.png" alt=""> Notification
          <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount }}</span>
        </li>
        <li routerLink="/book">
          <img src="/icons/cart.png" alt=""> Book Cart
        </li>

      </ul>
    </aside>

    <section class="content">

      <h2>Library</h2>
      <div class="search-container">
        <div class="search">
          <input type="text" placeholder="Search by title or author" [(ngModel)]="searchTerm">
        </div>

        <div class="filter-dropdown">
          <button class="filter-btn" [class.active]="isFilterOpen" (click)="isFilterOpen = !isFilterOpen">
            <img src="/icons/filter.png" alt="">
          </button>

          <div class="filter-menu" *ngIf="isFilterOpen">
            <label *ngFor="let g of genres" class="filter-option">
              <input type="checkbox" [checked]="selectedGenres.includes(g.Genre)" (change)="toggleGenre(g.Genre)" />
              {{ g.Genre }}
            </label>
          </div>
        </div>
      </div>

      <div class="active-filters" *ngIf="selectedGenres.length > 0">
        <span class="filter-pill" *ngFor="let genre of selectedGenres">
          {{ genre }} <span class="remove-filter" (click)="toggleGenre(genre)">×</span>
        </span>
      </div>

      <div class="books-list">
        <div class="book-card" *ngFor="let book of filteredBooks">
          <div class="book-card-inner">
            <div class="book-img" *ngIf="book.Image_URL">
              <img [src]="'http://127.0.0.1:3000/' + book.Image_URL" class="book-cover-img" alt="Book Cover">
            </div>

            <div class="book-info">
              <div class="title-section">
                <h3 [title]="book.Title">{{ book.Title }}</h3>
                <span class="status" [class.available]="book.Status === 'Available'"
                  [class.loaned]="book.Status === 'Loaned'" [class.reserved]="book.Status === 'Reserved'">
                  {{ book.Status === 'Loaned' ? 'Unavailable' : book.Status }}
                </span>
              </div>
              <button class="borrow-btn" *ngIf="book.Status === 'Available'" (click)="addToCart(book)"
                [disabled]="cartItemIds.has(book.Book_id)"
                [ngStyle]="cartItemIds.has(book.Book_id) ? {'background': 'gray', 'cursor': 'not-allowed'} : {}">
                {{ cartItemIds.has(book.Book_id) ? 'Added to Cart' : 'Add to Cart' }}
              </button>
              <p class="edition">ISBN: {{ book.isbn }}</p>
              <p class="author">By: {{ book.Author }}</p>
              <p class="description" *ngIf="book.discription">{{ book.discription }}</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
