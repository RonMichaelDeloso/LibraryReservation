<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
</head>
<body>
  <div class="main">

    <header class="topbar">
      <div class="title">Library</div>

      <div class="user">
        USER1 👤
      </div>
    </header>
  <div class="container">

  <aside class="sidebar">

    <ul class="menu">
      <li class="active">🏠 Home</li>
      <li routerLink="/notification">🔔 Notification</li>
      <li routerLink="/book">📚 Book</li>
      <li routerLink="/settings">⚙️ Settings</li>
    </ul>
  </aside>
  
  <section class="content">

      <h2>Library</h2>
      <div class="search">
        <input type="text" placeholder="Search">
      </div>

      <div class="books-list">
        <div class="book-card" *ngFor="let book of filteredBooks">
          <div class="book-info">
            <h3>{{ book.title }}</h3>
            <p class="edition">{{ book.edition }}</p>
            <p class="author">By: {{ book.author }}</p>
            <span class="status" [class.available]="book.status === 'Available'">
              {{ book.status }}
            </span>
            <button class="borrow-btn" *ngIf="book.status === 'Available'" (click)="borrowBook(book)">
              Borrow
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
