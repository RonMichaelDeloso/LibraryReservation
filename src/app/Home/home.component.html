<div class="main">

    <header class="topbar">
      <div class="title">Library</div>

      <div class="user">
        {{ userName }} 👤
      </div>
    </header>
  <div class="container">

  <aside class="sidebar">

    <ul class="menu">
      <li class="active">
        <img src="icons/house-regular.png" alt="Home Icon" class="Home"> Home
      </li>
      <li routerLink="/notification">
        <img src="icons/bell-solid.png" alt="Bell Icon" class="bell"> Notification
      </li>
      <li routerLink="/book"> Book Cart</li>
      <li routerLink="/settings"> Settings</li>
    </ul>
  </aside>
  
  <section class="content">

      <h2>Library</h2>
      <div class="search-container">
        <div class="search" style="margin-bottom: 0;">
          <input type="text" placeholder="Search by title or author" [(ngModel)]="searchTerm">
        </div>
        
        <div class="filter-dropdown">
          <button class="filter-btn" (click)="isFilterOpen = !isFilterOpen">
            ⚲ Filter
          </button>
          
          <div class="filter-menu" *ngIf="isFilterOpen">
            <label *ngFor="let g of genres" class="filter-option">
              <input type="checkbox" 
                     [checked]="selectedGenres.includes(g.Genre)"
                     (change)="toggleGenre(g.Genre)" />
              {{ g.Genre }}
            </label>
          </div>
        </div>
      </div>

      <div class="books-list">
        <div class="book-card" *ngFor="let book of filteredBooks">
          <div style="display: flex; gap: 20px;">
            <!-- Book Image -->
            <div class="book-img" *ngIf="book.Image_URL" style="flex-shrink: 0;">
              <img [src]="'http://127.0.0.1:3000/' + book.Image_URL" style="width: 80px; height: 120px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" alt="Book Cover">
            </div>

            <div class="book-info" style="flex: 1; min-width: 0;">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 8px;">
                <div class="title-section" style="padding-right: 0; flex: 1;">
                  <h3 [title]="book.Title">{{ book.Title }}</h3>
                  <span class="status" 
                    [class.available]="book.Status === 'Available'"
                    [class.loaned]="book.Status === 'Loaned'"
                    [class.reserved]="book.Status === 'Reserved'">
                    {{ book.Status }}
                  </span>
                </div>
                <button class="borrow-btn" *ngIf="book.Status === 'Available'" (click)="addToCart(book)" style="position: static; margin: 0; white-space: nowrap;">
                  Add to Cart
                </button>
              </div>
              <p class="edition">ISBN: {{ book.isbn }}</p>
              <p class="author">By: {{ book.Author }}</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
