<div class="login-container">

  <div class="card">

    <div class="header">
      <h2>Sign In</h2>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="off">

      <div class="input-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="Email"
          autocomplete="off"
          placeholder="Enter your email"
          [class.input-error]="loginForm.get('Email')?.invalid && (loginForm.get('Email')?.touched || loginForm.get('Email')?.errors?.['serverError'])"
        />
        <span class="field-error" *ngIf="loginForm.get('Email')?.invalid && (loginForm.get('Email')?.touched || loginForm.get('Email')?.errors?.['serverError'])">
          <span *ngIf="loginForm.get('Email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="loginForm.get('Email')?.errors?.['email']">Enter a valid email address.</span>
          <span *ngIf="loginForm.get('Email')?.errors?.['serverError']">{{ loginForm.get('Email')?.errors?.['serverError'] }}</span>
        </span>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="pw-row">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="Password"
            autocomplete="new-password"
            placeholder="Enter your password"
            [class.input-error]="loginForm.get('Password')?.invalid && (loginForm.get('Password')?.touched || loginForm.get('Password')?.errors?.['serverError'])"
          />
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <span class="field-error" *ngIf="loginForm.get('Password')?.invalid && (loginForm.get('Password')?.touched || loginForm.get('Password')?.errors?.['serverError'])">
          <span *ngIf="loginForm.get('Password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="loginForm.get('Password')?.errors?.['serverError']">{{ loginForm.get('Password')?.errors?.['serverError'] }}</span>
        </span>
      </div>

      <p *ngIf="message" class="message"
         [class.message-success]="messageType === 'success'"
         [class.message-error]="messageType === 'error'">
        {{ message }}
      </p>

      <div class="forgot-link">
        <a routerLink="/forgotpassword">Forgot Password?</a>
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

      <p class="signup-link">
        Don't have an account? <a routerLink="/signup">Create account</a>
      </p>

    </form>

  </div>

</div>
