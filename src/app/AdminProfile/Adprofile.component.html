<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Profile</title>
</head>

<body>
  <div class="main">

    <header class="topbar">
      <div class="title">Library</div>
      <div class="user-container">
        <div class="user" (click)="toggleDropdown()">{{ userName }} <img src="/icons/user.png" class="user-icon" alt=""></div>
        <div class="dropdown" *ngIf="showDropdown">
          <div class="dropdown-item" routerLink="/adprofile">
            <img src="/icons/user.png" alt=""> Profile
          </div>
          <div class="dropdown-item" routerLink="/dashboard">
            <img src="/icons/home.png" alt=""> Dashboard
          </div>
          <div class="dropdown-item" (click)="logout()">
            <img src="/icons/logout.png" alt=""> Logout
          </div>
        </div>
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <ul class="menu">
          <li routerLink="/adhome"><img src="/icons/home.png" alt=""> Home</li>
          <li routerLink="/adnot">
            <img src="/icons/notification.png" alt=""> Notification
            <span *ngIf="unreadCount > 0" class="badge">{{ unreadCount }}</span>
          </li>
          <li routerLink="/list"><img src="/icons/list.png" alt=""> List</li>
        </ul>
      </aside>

      <section class="content">
        <!-- Admin Profile Card -->
        <div class="account-card">
          <div class="card-header active-header">
            <p><img src="/icons/user.png" class="icon"> Admin Profile</p>
          </div>

          <div class="account-row">
            <div class="profile-pair">
              <div class="profile-block">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="admin avatar" />
                <div class="info">
                  <h4>{{ userName }}</h4>
                  <p style="color: #000000; margin-bottom: 5px;">{{ userRole }}</p>
                  <p>{{ userEmail }}</p>
                </div>
              </div>
            </div>

            <div class="action-buttons">
              <button class="edit-profile-btn" (click)="openEditModal()">Edit Profile</button>
              <button class="password-btn" (click)="openPasswordModal()">Change Password</button>
            </div>
          </div>
        </div>

        <!-- Admin Invite Card -->
        <div class="invite-card">
          <div class="card-header invite-header">
            <p><img src="/icons/notification.png" class="icon"> Admin Invite</p>
          </div>
          <div class="invite-body">
            <div class="invite-row">
              <input
                type="email"
                class="invite-input"
                [(ngModel)]="inviteEmail"
                placeholder="Enter email to invite as Admin"
              >
              <button class="invite-btn" (click)="sendAdminInvite()">Send Invite</button>
            </div>
            <p class="invite-msg success" *ngIf="inviteSuccess">&#10004; Invite sent successfully!</p>
            <p class="invite-msg error" *ngIf="inviteError">&#10008; {{ inviteError }}</p>
          </div>
        </div>
      </section>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" *ngIf="isEditModalOpen">
      <div class="modal-content">
        <h3>Edit Profile</h3>
        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="editFirstName" placeholder="Enter first name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="editLastName" placeholder="Enter last name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="editEmail" placeholder="Enter email">
        </div>
        <div class="modal-actions">
          <button class="cancel-btn" (click)="closeEditModal()">Cancel</button>
          <button class="save-modal-btn" (click)="saveProfile()">Save Changes</button>
        </div>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal-overlay" *ngIf="isPasswordModalOpen">
      <div class="modal-content">
        <h3>Change Password</h3>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" [(ngModel)]="newPassword" placeholder="Enter new password">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm new password">
        </div>
        <div class="modal-actions">
          <button class="cancel-btn" (click)="closePasswordModal()">Cancel</button>
          <button class="save-modal-btn" (click)="submitPasswordChange()">Update Password</button>
        </div>
      </div>
    </div>

  </div>
</body>

</html>
