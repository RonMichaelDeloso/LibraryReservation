<div class="container">
  <aside class="sidebar">
    <div class="logo">Library</div>
    <ul class="menu">
      <li routerLink="/home">Home</li>
      <li routerLink="/notification">Notification</li>
      <li routerLink="/booking"> Booking</li>
      <li routerLink="/list"> List</li>
      <li class="active"> Settings</li>
      <li routerLink="/add-books"> Add Books</li>
    </ul>
  </aside>
  <div class="main">
    <header class="topbar">
      <input class="search" type="text" placeholder="Search">
      <div class="user">
        <span>USER1</span>
        <div class="icon"></div>
      </div>
    </header>
    <section class="content">
      <h2>Settings</h2>
      <div class="account-card">
        <div class="card-header">
          <span><p>Account Settings</p></span>
        </div>
        <div class="account-body">
          <div class="profile">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <div class="info">
              <h4>Ron Michael Deloso</h4>
              <p>Ron.MichaelDeloso@gmail.com</p>
            </div>
          </div>

          <div class="buttons">
            <button class="change"(click)="changePassword()">Change Password</button>
            <button class="save"(click)="saveChanges()">Save Change</button>
          </div>
        </div>
      </div>
      <div class="notification-card">
        <div class="card-header">
          <span><p>Notification Settings</p></span>
        </div>
      </div>
    </section>
  </div>
</div>
