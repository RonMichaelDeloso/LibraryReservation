<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library Settings</title>
</head>

<body>
  <div class="main">

    <header class="topbar">
      <div class="title">Library</div>
      <div class="user-container">
        <div class="user" (click)="toggleDropdown()">{{ topbarName }} 👤</div>
        <div class="dropdown" *ngIf="showDropdown">
          <div class="dropdown-item" (click)="logout()">
            🚪 Logout
          </div>
        </div>
      </div>
    </header>


    <div class="container">
      <aside class="sidebar">
              <ul class="menu">
        <li routerLink="/home"><img src="/icons/home.png" alt=""> Home</li>
        <li routerLink="/notification"><img src="/icons/Notification.png" alt=""> Notification</li>
        <li routerLink="/book"><img src="/icons/cart.png" alt=""> Book Cart</li>
        <li class="active" routerLink="/settings"><img src="/icons/settings.png" alt=""> Settings</li>
      </ul>
      </aside>

      <section class="content">
        <h2>Settings</h2>

        <div class="account-card">
          <div class="card-header active-header">
            <p>⚙️ Account Settings</p>
          </div>

          <div class="account-row">

            <div class="profile-pair">

              <div class="profile-block">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="user01 avatar" />
                <div class="info">
                  <h4>{{ userName }}</h4>
                  <p>{{ userEmail }}</p>
                </div>
              </div>

            </div>

            <div class="action-buttons">
              <button class="password-btn" onclick="console.log('Change password flow')">Change Password</button>
              <button class="save-btn" onclick="console.log('Changes saved (demo)')">Save Change</button>
            </div>
          </div>
        </div>


        <div class="notification-card">
          <div class="card-header inactive-header">
            <p>🔔 Notification Settings</p>
          </div>
        </div>


      </section>
    </div>
  </div>
</body>

</html>
