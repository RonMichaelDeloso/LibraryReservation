<div class="main">
  <header class="topbar">
    <div class="title">Library</div>
    <div class="user">
      {{ adminName }} 👤
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
            <ul class="menu">
        <li class="active" routerLink="/adhome"><img src="/icons/home.png" alt=""> Home</li>
        <li routerLink="/adnot"><img src="/icons/Notification.png" alt=""> Notification</li>
        <li routerLink="/list"><img src="/icons/cart.png" alt=""> List</li>
        <li routerLink="/settingsadmin"><img src="/icons/settings.png" alt=""> Settings</li>
      </ul>
    </aside>

    <section class="content">
      <h2>Library</h2>
      
      <div class="search">
        <input type="text" placeholder="Search books..." [(ngModel)]="searchTerm">
      </div>

      <div class="books-list">
        <div class="book-card" *ngFor="let book of filteredBooks">
          <div style="display: flex; gap: 20px;">
            <!-- Book Image -->
            <div class="book-img" *ngIf="book.Image_URL" style="flex-shrink: 0;">
              <img [src]="'http://127.0.0.1:3000/' + book.Image_URL" style="width: 80px; height: 120px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" alt="Book Cover">
            </div>

            <div style="flex: 1; min-width: 0;">
              <!-- Title row with status and buttons -->
              <div class="title-row" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: flex-start;">
                <div class="title-section" style="flex: 1;">
                  <h3 [title]="book.Title">{{ book.Title }}</h3>
                  <span class="status" 
                    [class.available]="book.Status === 'Available'"
                    [class.loaned]="book.Status === 'Loaned'"
                    [class.reserved]="book.Status === 'Reserved'">
                    {{ book.Status }}
                  </span>
                </div>
                <div class="admin-actions" style="display: flex; gap: 6px; white-space: nowrap;">
                  <button class="edit-btn" (click)="editBook(book)">✏️ Edit</button>
                  <button class="delete-btn" (click)="deleteBook(book.Book_id)">🗑️ Delete</button>
                </div>
              </div>
              
              <!-- Book details -->
              <div class="book-info">
                <p class="edition">ISBN: {{ book.isbn }}</p>
                <p class="author">By: {{ book.Author }}</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="add-book-btn" (click)="openAddBookModal()">+ Add Books</button>
    </section>
  </div>

  <!-- Add Book Modal -->
  <div class="modal-backdrop" *ngIf="isAddModalOpen">
    <div class="modal-content">
      <h3>Add New Book</h3>
      <div class="form-group">
        <label>Title</label>
        <input type="text" [(ngModel)]="newBook.Title">
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" [(ngModel)]="newBook.Author">
      </div>
      <div class="form-group">
        <label>ISBN</label>
        <input type="text" [(ngModel)]="newBook.isbn">
      </div>
      <div class="form-group">
        <label>Book Cover Image</label>
        <input type="file" (change)="onFileSelected($event)" accept="image/*">
      </div>
      <div class="form-group genre-list">
        <label>Genres (Optional)</label>
        <div class="genre-checkboxes">
          <label *ngFor="let g of genres">
            <input type="checkbox" 
                   [checked]="newBook.Genre_id.includes(g.Genre_id)"
                   (change)="toggleGenreSelection(g.Genre_id)"> {{g.Genre}}
          </label>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeAddModal()">Cancel</button>
        <button class="btn-submit" (click)="submitAddBook()">Save</button>
      </div>
    </div>
  </div>

  <!-- Edit Book Modal -->
  <div class="modal-backdrop" *ngIf="isEditModalOpen">
    <div class="modal-content">
      <h3>Edit Book</h3>
      <div class="form-group">
        <label>Title</label>
        <input type="text" [(ngModel)]="editBookData.Title">
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" [(ngModel)]="editBookData.Author">
      </div>
      <div class="form-group">
        <label>ISBN</label>
        <input type="text" [(ngModel)]="editBookData.isbn">
      </div>
      <div class="form-group">
        <label>Book Cover Image (Leave blank to keep current)</label>
        <input type="file" (change)="onFileSelected($event)" accept="image/*">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="editBookData.Status">
          <option value="Available">Available</option>
          <option value="Borrowed">Borrowed</option>
          <option value="Reserved">Reserved</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" (click)="closeEditModal()">Cancel</button>
        <button class="btn-submit" (click)="submitEditBook()">Update</button>
      </div>
    </div>
  </div>
</div>
