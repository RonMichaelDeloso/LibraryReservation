<div class="main">
  <header class="topbar">
    <div class="title">Library</div>
    <div class="user-container">
      <div class="user" (click)="toggleDropdown()">{{ userName }} <img src="/icons/user.png" class="user-icon" alt="">
      </div>
      <div class="dropdown" *ngIf="showDropdown">
        <div class="dropdown-item" routerLink="/adprofile">
          <img src="/icons/user.png" alt=""> Profile
        </div>
        <div class="dropdown-item" routerLink="/dashboard">
          <img src="/icons/home.png" alt=""> Dashboard
        </div>
        <div class="dropdown-item" (click)="logout()">
          <img src="/icons/logout.png" alt=""> Logout
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <ul class="menu">
        <li routerLink="/adhome"><img src="/icons/home.png" alt=""> Home</li>
        <li class="active" routerLink="/adnot"><img src="/icons/notification.png" alt=""> Notification</li>
        <li routerLink="/list"><img src="/icons/list.png" alt=""> List</li>

      </ul>
    </aside>

    <section class="content">
      <div class="notif-header">
        <h2>Notifications</h2>
        <button class="mark-all-btn" *ngIf="notifications.length > 0" (click)="clearAll()">
          Clear all
        </button>
      </div>

      <!-- Empty state -->
      <div class="empty-state" *ngIf="notifications.length === 0">
        <div class="empty-icon"> <img src="/icons/notification.png" alt=""></div>
        <p>No notifications yet.</p>
        <span>You're all caught up!</span>
      </div>

      <!-- Notification list -->
      <div class="notif-list" *ngIf="notifications.length > 0">
        <div class="notification-card" *ngFor="let notif of notifications" [class.unread]="!notif.is_read">

          <div class="notif-left">
            <div class="bell-icon">{{ notif.is_read ? '🔕' : '🔔' }}</div>
            <div class="notif-body">
              <p class="notif-text">{{ notif.Message }}</p>
              <span class="notif-time">{{ notif.created_at | date:'MMM d, y • h:mm a' }}</span>
            </div>
          </div>

          <button class="close-btn" (click)="dismiss(notif)" title="Delete notification">
            ×
          </button>
        </div>
      </div>
    </section>
  </div>
</div>
