<div class="forgotpassword-container">
  <div class="card">
    <h2>New Password</h2>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <label for="fp-email">Username/Email</label>
        <input
          id="fp-email"
          type="email"
          formControlName="email"
          autocomplete="off"
          placeholder=""
          [class.input-error]="resetForm.get('email')?.invalid && resetForm.get('email')?.touched"
        />
        <span class="field-error" *ngIf="resetForm.get('email')?.invalid && resetForm.get('email')?.touched">
          <span *ngIf="resetForm.get('email')?.errors?.['required']">Email is required.</span>
          <span *ngIf="resetForm.get('email')?.errors?.['email']">Enter a valid email address.</span>
        </span>
      </div>

      <div class="input-group">
        <label for="fp-newpw">New password</label>
        <div class="pw-row">
          <input
            id="fp-newpw"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="newPassword"
            placeholder=""
            [class.input-error]="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"
          />
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
        <span class="field-error" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
          <span *ngIf="resetForm.get('newPassword')?.errors?.['required']">Password is required.</span>
          <span *ngIf="resetForm.get('newPassword')?.errors?.['minlength']">Must be at least 6 characters.</span>
        </span>
      </div>

      <div class="input-group">
        <label for="fp-confirmpw">Confirm Password</label>
        <div class="pw-row">
          <input
            id="fp-confirmpw"
            [type]="showConfirm ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder=""
            [class.input-error]="resetForm.get('confirmPassword')?.touched && resetForm.errors?.['passwordMismatch']"
          />
          <button type="button" class="password-toggle" (click)="showConfirm = !showConfirm">
            {{ showConfirm ? 'Hide' : 'Show' }}
          </button>
        </div>
        <span class="field-error" *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.errors?.['passwordMismatch']">
          Passwords do not match.
        </span>
      </div>

      <p *ngIf="message" class="message"
         [class.message-success]="messageType === 'success'"
         [class.message-error]="messageType === 'error'">
        {{ message }}
      </p>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        {{ isLoading ? 'Saving...' : 'Login' }}
      </button>

      <p class="back">
        <a routerLink="/login">Back</a>
      </p>

    </form>
  </div>
</div>
