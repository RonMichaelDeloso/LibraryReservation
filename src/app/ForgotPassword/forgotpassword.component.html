<div class="forgotpassword-container">
  <div class="card">
    <div class="header">
      <h2>{{ step === 1 ? 'Forgot Password' : 'Reset Password' }}</h2>
    </div>

    <!-- Step 1: Request OTP -->
    <form *ngIf="step === 1" [formGroup]="forgotForm" (ngSubmit)="onSendOTP()">
      <div class="input-group">
        <label>Email Address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
        />
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Sending...' : 'Send OTP' }}
      </button>

      <p class="back">
        <a routerLink="/login">Back to Login</a>
      </p>

      <p *ngIf="message" [style.color]="messageType === 'error' ? 'red' : 'green'" class="message">
        {{ message }}
      </p>
    </form>

    <!-- Step 2: Verify OTP and Reset Password -->
    <form *ngIf="step === 2" [formGroup]="resetForm" (ngSubmit)="onResetPassword()">
      <div class="input-group">
        <label>Enter OTP</label>
        <input
          type="text"
          formControlName="otp"
          placeholder="Enter 6-digit OTP"
          maxlength="6"
        />
        <button 
          type="button" 
          class="resend-btn" 
          (click)="onResendOTP()"
          [disabled]="resendTimer > 0">
          {{ resendTimer > 0 ? `Resend in ${resendTimer}s` : 'Resend OTP' }}
        </button>
      </div>

      <div class="input-group">
        <label>New Password</label>
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="newPassword"
          placeholder="Enter new password"
        />
        <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input
          [type]="showConfirm ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="Confirm new password"
        />
        <button type="button" class="password-toggle" (click)="showConfirm = !showConfirm">
          {{ showConfirm ? 'Hide' : 'Show' }}
        </button>
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <p class="back">
        <a (click)="goBack()" style="cursor: pointer;">Back to Email</a>
      </p>

      <p *ngIf="message" [style.color]="messageType === 'error' ? 'red' : 'green'" class="message">
        {{ message }}
      </p>
    </form>
  </div>
</div>
